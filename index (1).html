<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBA Mentor Connect</title>

<!-- Firebase compat SDK — no ES module scoping issues -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: #0a0a0f;
  color: #e8e4dc;
  min-height: 100vh;
}

.hero {
  background: linear-gradient(135deg, #0a0a0f 0%, #12102a 50%, #0a1a0f 100%);
  padding: 2.2rem 1.5rem 1.8rem;
  text-align: center;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.8rem, 5vw, 2.4rem);
  background: linear-gradient(135deg, #f5c842, #e8a020);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.2;
}

.container { max-width: 700px; margin: 0 auto; padding: 1.5rem 1rem; }

.stats-bar { display: flex; gap: 10px; margin-bottom: 1.5rem; }
.stat {
  flex: 1;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 10px;
  padding: 0.8rem;
  text-align: center;
}
.stat-num { font-size: 1.5rem; font-weight: 700; color: #f5c842; }
.stat-lbl { font-size: 0.68rem; color: rgba(232,228,220,0.35); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.07em; }

.search-bar { display: flex; gap: 8px; margin-bottom: 1.2rem; }
.search-bar input {
  flex: 1;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 0.65rem 1rem;
  color: #e8e4dc;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s;
}
.search-bar input:focus { border-color: rgba(245,200,66,0.4); }
.search-bar input::placeholder { color: rgba(232,228,220,0.25); }

.btn {
  padding: 0.6rem 1.1rem;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  transition: all 0.18s;
  white-space: nowrap;
}
.btn-gold    { background: #f5c842; color: #1a1400; }
.btn-gold:hover { background: #f7d160; transform: translateY(-1px); }
.btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.15); color: #e8e4dc; }
.btn-outline:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.3); }
.btn-green   { background: #1a6b3a; color: #a8f0c0; border: none; }
.btn-green:hover { background: #1e7d44; }
.btn-danger  {
  background: rgba(220,50,50,0.12);
  border: 1px solid rgba(220,50,50,0.25);
  color: #f08080;
  font-size: 0.78rem;
  padding: 0.35rem 0.75rem;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  transition: background 0.15s;
}
.btn-danger:hover { background: rgba(220,50,50,0.22); }

.section-label {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: rgba(232,228,220,0.3);
  margin-bottom: 0.8rem;
  padding-bottom: 0.4rem;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.college-grid { display: flex; flex-direction: column; gap: 8px; }
.college-card {
  background: rgba(255,255,255,0.025);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px;
  overflow: hidden;
  transition: border-color 0.2s;
}
.college-card:hover    { border-color: rgba(245,200,66,0.18); }
.college-card.expanded { border-color: rgba(245,200,66,0.35); background: rgba(245,200,66,0.025); }

.college-header {
  display: flex;
  align-items: center;
  padding: 0.9rem 1.1rem;
  cursor: pointer;
  gap: 10px;
  user-select: none;
}
.college-rank  { font-size: 0.7rem; color: rgba(245,200,66,0.45); min-width: 26px; font-weight: 600; }
.college-info  { flex: 1; }
.college-name  { font-size: 0.93rem; font-weight: 600; color: #e8e4dc; margin-bottom: 1px; }
.college-city  { font-size: 0.76rem; color: rgba(232,228,220,0.38); }
.mentor-count  {
  font-size: 0.72rem;
  background: rgba(245,200,66,0.1);
  color: #f5c842;
  padding: 3px 8px;
  border-radius: 20px;
  white-space: nowrap;
}
.chevron      { color: rgba(232,228,220,0.3); font-size: 0.8rem; transition: transform 0.2s; display: inline-block; }
.chevron.open { transform: rotate(180deg); }

.college-body {
  padding: 0 1.1rem 1.1rem;
  border-top: 1px solid rgba(255,255,255,0.05);
}

.mentor-list { margin-top: 1rem; display: flex; flex-direction: column; gap: 7px; }
.mentor-item {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.04);
  border-radius: 9px;
  padding: 0.65rem 0.9rem;
}
.mentor-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, #1a4a2a, #2a6a3a);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 0.73rem; color: #a8f0c0;
  flex-shrink: 0;
}
.mentor-details { flex: 1; min-width: 0; }
.mentor-name    { font-size: 0.87rem; font-weight: 600; color: #e8e4dc; }
.mentor-phone   { font-size: 0.76rem; color: rgba(232,228,220,0.4); }
.wa-btn {
  display: flex; align-items: center; gap: 4px;
  background: #128c44; color: #fff;
  border: none; border-radius: 7px;
  padding: 0.33rem 0.7rem;
  font-size: 0.77rem; font-weight: 600;
  cursor: pointer; text-decoration: none;
  transition: background 0.15s; flex-shrink: 0;
}
.wa-btn:hover { background: #1aa855; }

.register-box {
  margin-top: 1rem;
  background: rgba(245,200,66,0.04);
  border: 1px dashed rgba(245,200,66,0.18);
  border-radius: 10px;
  padding: 1rem;
}
.register-box h4 { font-size: 0.83rem; color: #f5c842; margin-bottom: 0.75rem; font-weight: 600; }

.form-row { display: flex; gap: 8px; flex-wrap: wrap; }
.form-input {
  flex: 1; min-width: 130px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  padding: 0.55rem 0.85rem;
  color: #e8e4dc;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  outline: none;
  transition: border-color 0.2s;
}
.form-input:focus        { border-color: rgba(245,200,66,0.4); }
.form-input::placeholder { color: rgba(232,228,220,0.22); }

.add-college-section {
  background: rgba(255,255,255,0.025);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px;
  padding: 1.2rem;
  margin-top: 1.5rem;
}
.add-college-section h3 {
  font-size: 0.85rem; font-weight: 600;
  color: rgba(232,228,220,0.55);
  margin-bottom: 0.9rem;
}

.toast {
  position: fixed; bottom: 1.5rem; right: 1rem;
  background: #1a6b3a; color: #a8f0c0;
  padding: 0.7rem 1.2rem;
  border-radius: 10px;
  font-size: 0.85rem; font-weight: 500;
  opacity: 0; transform: translateY(8px);
  transition: all 0.25s; pointer-events: none; z-index: 999;
}
.toast.show  { opacity: 1; transform: translateY(0); }
.toast.error { background: #6b1a1a; color: #f0a0a0; }

.empty-state { text-align: center; padding: 1.5rem; color: rgba(232,228,220,0.28); font-size: 0.85rem; }
.loading     { text-align: center; padding: 2.5rem; color: rgba(232,228,220,0.28); font-size: 0.9rem; }

@media (max-width: 480px) {
  .college-header { padding: 0.8rem; }
  .form-row       { flex-direction: column; }
  .form-input     { min-width: unset; }
  .stats-bar      { gap: 6px; }
}
</style>
</head>
<body>

<div class="hero">
  <h1>MBA Mentor Connect</h1>
</div>

<div class="container">
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-num" id="statColleges">—</div>
      <div class="stat-lbl">Colleges</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="statMentors">—</div>
      <div class="stat-lbl">Mentors</div>
    </div>
    <div class="stat">
      <div class="stat-num">🟢</div>
      <div class="stat-lbl">Live</div>
    </div>
  </div>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search college or city…" oninput="filterColleges()">
    <button class="btn btn-outline" onclick="document.getElementById('addCollegeSection').scrollIntoView({behavior:'smooth'})">
      + Add College
    </button>
  </div>

  <div class="section-label">All colleges — click to view mentors or register</div>
  <div class="college-grid" id="collegeGrid">
    <div class="loading">Connecting to database…</div>
  </div>

  <div class="add-college-section" id="addCollegeSection">
    <h3>➕ Add a college not in the list</h3>
    <div class="form-row">
      <input class="form-input" id="newCollegeName" placeholder="College name (e.g. IIM Trichy)">
      <input class="form-input" id="newCollegeCity" placeholder="City, State">
      <button class="btn btn-gold" onclick="addCollege()">Add</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- All JS in a regular script tag — no module scoping, all functions are global -->
<script>
// ============================================================
// 🔴 REPLACE THIS BLOCK WITH YOUR FIREBASE CONFIG
// Firebase Console → Project Settings → Your Apps → Web App
// ============================================================
var firebaseConfig = {
  apiKey:            "AIzaSyCz-PsGMO3C8UjL3wF7SnQi2aRRf7HBDK4",
  authDomain:        "mba-mentor-connect.firebaseapp.com",
  databaseURL:       "https://mba-mentor-connect-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "mba-mentor-connect",
  storageBucket:     "mba-mentor-connect.firebasestorage.app",
  messagingSenderId: "771371972635",
  appId:             "1:771371972635:web:207c8b873bb7438a74e0be"
};
// ============================================================

firebase.initializeApp(firebaseConfig);
var db = firebase.database();

var DEFAULT_COLLEGES = [
  {id:'iima',         name:'IIM Ahmedabad',                   city:'Ahmedabad, Gujarat'},
  {id:'iimb',         name:'IIM Bangalore',                   city:'Bangalore, Karnataka'},
  {id:'iimc',         name:'IIM Calcutta',                    city:'Kolkata, West Bengal'},
  {id:'iiml',         name:'IIM Lucknow',                     city:'Lucknow, Uttar Pradesh'},
  {id:'iimk',         name:'IIM Kozhikode',                   city:'Kozhikode, Kerala'},
  {id:'iimi',         name:'IIM Indore',                      city:'Indore, Madhya Pradesh'},
  {id:'xlri',         name:'XLRI Jamshedpur',                 city:'Jamshedpur, Jharkhand'},
  {id:'fms',          name:'FMS Delhi',                       city:'New Delhi'},
  {id:'spjain',       name:'SP Jain Institute of Management', city:'Mumbai, Maharashtra'},
  {id:'mdi',          name:'MDI Gurgaon',                     city:'Gurgaon, Haryana'},
  {id:'iimrohtak',    name:'IIM Rohtak',                      city:'Rohtak, Haryana'},
  {id:'iimraipur',    name:'IIM Raipur',                      city:'Raipur, Chhattisgarh'},
  {id:'iimranchi',    name:'IIM Ranchi',                      city:'Ranchi, Jharkhand'},
  {id:'iimudaipur',   name:'IIM Udaipur',                     city:'Udaipur, Rajasthan'},
  {id:'iimkashipur',  name:'IIM Kashipur',                    city:'Kashipur, Uttarakhand'},
  {id:'iimshillong',  name:'IIM Shillong',                    city:'Shillong, Meghalaya'},
  {id:'iimtrichy',    name:'IIM Tiruchirappalli',             city:'Trichy, Tamil Nadu'},
  {id:'iimbodhgaya',  name:'IIM Bodhgaya',                    city:'Bodhgaya, Bihar'},
  {id:'iimvizag',     name:'IIM Visakhapatnam',               city:'Visakhapatnam, Andhra Pradesh'},
  {id:'iimamritsar',  name:'IIM Amritsar',                    city:'Amritsar, Punjab'},
  {id:'iimjammu',     name:'IIM Jammu',                       city:'Jammu, J&K'},
  {id:'iimsambalpur', name:'IIM Sambalpur',                   city:'Sambalpur, Odisha'},
  {id:'iimsirrmaur',  name:'IIM Sirmaur',                     city:'Sirmaur, Himachal Pradesh'},
  {id:'nitie',        name:'NITIE Mumbai',                    city:'Mumbai, Maharashtra'},
  {id:'ximb',         name:'XIM University',                  city:'Bhubaneswar, Odisha'},
  {id:'iift',         name:'IIFT Delhi/Kolkata',              city:'Delhi / Kolkata'},
  {id:'nmims',        name:'NMIMS Mumbai',                    city:'Mumbai, Maharashtra'},
  {id:'sibm',         name:'SIBM Pune',                       city:'Pune, Maharashtra'},
  {id:'scmhrd',       name:'SCMHRD Pune',                     city:'Pune, Maharashtra'},
  {id:'tiss',         name:'TISS Mumbai',                     city:'Mumbai, Maharashtra'},
  {id:'irma',         name:'IRMA Anand',                      city:'Anand, Gujarat'},
  {id:'tapmi',        name:'TAPMI Manipal',                   city:'Manipal, Karnataka'},
  {id:'greatlakes',   name:'Great Lakes Institute',           city:'Chennai, Tamil Nadu'},
  {id:'lbsim',        name:'LBSIM Delhi',                     city:'New Delhi'},
  {id:'fore',         name:'FORE School of Management',       city:'New Delhi'}
];

var colleges     = [];
var expandedId   = null;
var searchTerm   = '';
var defaultOrder = DEFAULT_COLLEGES.map(function(d){ return d.id; });

// ── Helpers ──────────────────────────────────────────────────
function initials(name) {
  return name.trim().split(/\s+/).slice(0,2).map(function(w){ return w[0]; }).join('').toUpperCase();
}

function formatPhone(p) {
  var d = p.replace(/\D/g,'');
  return d.length === 10 ? d.slice(0,5) + ' ' + d.slice(5) : p;
}

function waLink(phone, name) {
  var d   = phone.replace(/\D/g,'');
  var num = d.length === 10 ? '91' + d : d;
  return 'https://wa.me/' + num + '?text=Hi+' + encodeURIComponent(name) + ',+I+found+you+on+MBA+Mentor+Connect+and+would+love+some+guidance!';
}

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type === 'error' ? ' error' : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(function(){ t.className = 'toast'; }, 2800);
}

function updateStats() {
  var total   = colleges.length;
  var mentors = colleges.reduce(function(s,c){ return s + c.mentors.length; }, 0);
  document.getElementById('statColleges').textContent = total;
  document.getElementById('statMentors').textContent  = mentors;
}

// ── Seed defaults ────────────────────────────────────────────
function seedDefaults() {
  DEFAULT_COLLEGES.forEach(function(c) {
    db.ref('colleges/' + c.id).once('value').then(function(snap) {
      if (!snap.exists()) {
        db.ref('colleges/' + c.id).set({ name: c.name, city: c.city });
      }
    });
  });
}

// ── Live listener ────────────────────────────────────────────
function listenToColleges() {
  db.ref('colleges').on('value', function(snap) {
    var data = snap.val() || {};
    colleges = Object.keys(data).map(function(id) {
      var val     = data[id];
      var mentors = [];
      if (val.mentors) {
        mentors = Object.keys(val.mentors).map(function(mid) {
          var m = val.mentors[mid];
          return { name: m.name, phone: m.phone, _key: mid };
        });
      }
      return { id: id, name: val.name, city: val.city, mentors: mentors };
    });

    colleges.sort(function(a, b) {
      var ai = defaultOrder.indexOf(a.id);
      var bi = defaultOrder.indexOf(b.id);
      if (ai !== -1 && bi !== -1) return ai - bi;
      if (ai !== -1) return -1;
      if (bi !== -1) return  1;
      return a.name.localeCompare(b.name);
    });

    render();
    updateStats();
  }, function(err) {
    // Firebase error — show colleges from DEFAULT_COLLEGES so the page isn't blank
    document.getElementById('collegeGrid').innerHTML =
      '<div class="empty-state">⚠️ Could not connect to database. Please check your Firebase config.<br><small style="opacity:.6">' + err.message + '</small></div>';
  });
}

// ── Render ───────────────────────────────────────────────────
function render() {
  var grid = document.getElementById('collegeGrid');
  var filtered = colleges.filter(function(c) {
    return !searchTerm ||
      c.name.toLowerCase().indexOf(searchTerm) !== -1 ||
      c.city.toLowerCase().indexOf(searchTerm) !== -1;
  });

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state">No colleges found. Add one below!</div>';
    return;
  }

  grid.innerHTML = filtered.map(function(c, i) {
    var isOpen = expandedId === c.id;
    var count  = c.mentors.length;
    return (
      '<div class="college-card' + (isOpen ? ' expanded' : '') + '" id="card-' + c.id + '">' +
        '<div class="college-header" onclick="toggle(\'' + c.id + '\')">' +
          '<div class="college-rank">#' + (i + 1) + '</div>' +
          '<div class="college-info">' +
            '<div class="college-name">' + c.name + '</div>' +
            '<div class="college-city">' + c.city + '</div>' +
          '</div>' +
          '<div class="mentor-count">' + count + ' mentor' + (count !== 1 ? 's' : '') + '</div>' +
          '<span class="chevron' + (isOpen ? ' open' : '') + '">▾</span>' +
        '</div>' +
        (isOpen ? renderBody(c) : '') +
      '</div>'
    );
  }).join('');
}

function renderBody(c) {
  var mentorItems = c.mentors.length === 0
    ? '<div class="empty-state" style="padding:0.8rem 0">No mentors yet — be the first!</div>'
    : c.mentors.map(function(m) {
        return (
          '<div class="mentor-item">' +
            '<div class="mentor-avatar">' + initials(m.name) + '</div>' +
            '<div class="mentor-details">' +
              '<div class="mentor-name">' + m.name + '</div>' +
              '<div class="mentor-phone">' + formatPhone(m.phone) + '</div>' +
            '</div>' +
            '<a class="wa-btn" href="' + waLink(m.phone, m.name) + '" target="_blank">💬 WhatsApp</a>' +
            '<button class="btn-danger" onclick="removeMentor(\'' + c.id + '\',\'' + m._key + '\')">✕</button>' +
          '</div>'
        );
      }).join('');

  return (
    '<div class="college-body">' +
      '<div class="mentor-list">' + mentorItems + '</div>' +
      '<div class="register-box">' +
        '<h4>Register as Mentor at ' + c.name + '</h4>' +
        '<div class="form-row">' +
          '<input class="form-input" id="mname-' + c.id + '" placeholder="Your full name" autocomplete="name">' +
          '<input class="form-input" id="mphone-' + c.id + '" placeholder="WhatsApp number (10 digits)" type="tel" maxlength="15">' +
          '<button class="btn btn-green" onclick="addMentor(\'' + c.id + '\')">Register</button>' +
        '</div>' +
      '</div>' +
    '</div>'
  );
}

// ── Actions — all global so onclick="" works ─────────────────
function toggle(id) {
  expandedId = expandedId === id ? null : id;
  render();
  if (expandedId) {
    setTimeout(function() {
      var card = document.getElementById('card-' + id);
      if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 60);
  }
}

function addMentor(collegeId) {
  var nameEl  = document.getElementById('mname-'  + collegeId);
  var phoneEl = document.getElementById('mphone-' + collegeId);
  if (!nameEl || !phoneEl) return;
  var name  = nameEl.value.trim();
  var phone = phoneEl.value.trim().replace(/\D/g,'');
  if (!name)             { showToast('Please enter your name', 'error'); return; }
  if (phone.length < 10) { showToast('Enter a valid 10-digit WhatsApp number', 'error'); return; }
  var college = colleges.filter(function(c){ return c.id === collegeId; })[0];
  if (college) {
    var dup = college.mentors.filter(function(m){ return m.phone.replace(/\D/g,'') === phone; })[0];
    if (dup) { showToast('This number is already registered!', 'error'); return; }
  }
  db.ref('colleges/' + collegeId + '/mentors').push({ name: name, phone: phone })
    .then(function() {
      nameEl.value = ''; phoneEl.value = '';
      expandedId = collegeId;
      showToast(name + ' registered as mentor! 🎉');
    })
    .catch(function(e) { showToast('Save failed: ' + e.message, 'error'); });
}

function removeMentor(collegeId, mentorKey) {
  if (!confirm('Remove this mentor?')) return;
  db.ref('colleges/' + collegeId + '/mentors/' + mentorKey).remove()
    .then(function() { expandedId = collegeId; showToast('Mentor removed'); })
    .catch(function(e) { showToast('Error: ' + e.message, 'error'); });
}

function addCollege() {
  var nameEl = document.getElementById('newCollegeName');
  var cityEl = document.getElementById('newCollegeCity');
  var name   = nameEl.value.trim();
  var city   = cityEl.value.trim();
  if (!name) { showToast('Enter college name', 'error'); return; }
  if (!city) { showToast('Enter city', 'error');         return; }
  var dup = colleges.filter(function(c){ return c.name.toLowerCase() === name.toLowerCase(); })[0];
  if (dup) { showToast('College already in list', 'error'); return; }
  var id = 'custom_' + Date.now();
  db.ref('colleges/' + id).set({ name: name, city: city })
    .then(function() {
      nameEl.value = ''; cityEl.value = '';
      searchTerm = ''; document.getElementById('searchInput').value = '';
      expandedId = id;
      showToast(name + ' added! ✓');
      setTimeout(function() {
        var card = document.getElementById('card-' + id);
        if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 400);
    })
